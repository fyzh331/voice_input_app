name: voice_input_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 使用最新稳定版的 record 插件
  record: ^5.0.0
  # 如果需要，可以显式排除 record_linux（但不需要，新版 record 已修复）
  
  permission_handler: ^11.0.0
  path_provider: ^2.1.0
  speech_to_text: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# 强制统一 record_platform_interface 的版本，避免接口不匹配
dependency_overrides:
  record_platform_interface: ^1.5.0

flutter:
  uses-material-design: true

name: voice_input_app
description: 离线语音输入法 - 支持国语/粤语/英文
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Whisper 离线语音识别
  whisper_kit: ^0.3.0
  
  # 权限管理
  permission_handler: ^11.0.0
  
  # 文件操作
  path_provider: ^2.1.0
  
  # 音频录制
  record: ^5.0.0
  
  # 状态管理
  provider: ^6.1.0
  
  # 图标
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/